name: Publish CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # 推荐用于 Trusted Publishing（更安全）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # 如果后续需要 git 信息可保留

      - name: Setup pnpm
        uses: pnpm/action-setup@v6          # 升级到最新 v6（2026 年推荐）
        with:
          version: 10                       # pnpm 10+ 完美支持 Node 24

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2          # Bun 目前仍推荐 v2

      - name: Install CLI dependencies
        run: cd packages/cli && pnpm install --frozen-lockfile

      - name: Build CLI
        run: cd packages/cli && bun build ./src/index.ts --outdir ./dist --target=node

      - name: Publish to npm
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # 如果你想尝试 Trusted Publishing（推荐未来切换），可移除上面的 env 并使用 npm publish --provenance
